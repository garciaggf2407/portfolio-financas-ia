spring.application.name=financas-ia

# Datasource (Postgres via docker-compose.yml)
spring.datasource.url=jdbc:postgresql://localhost:5433/financas_ia
spring.datasource.username=financas
spring.datasource.password=financas
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate: schema is owned by Flyway migrations, never by Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ (via docker-compose.yml)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
