spring.application.name=financas-ia

# Datasource (Postgres via docker-compose.yml)
spring.datasource.url=jdbc:postgresql://localhost:5433/financas_ia
spring.datasource.username=financas
spring.datasource.password=financas
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate: schema is owned by Flyway migrations, never by Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ (via docker-compose.yml)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Groq API (categorizacao automatica e resumo mensal via IA, E-4).
# groq.api.key e lida da variavel de ambiente GROQ_API_KEY -- nunca
# hardcoded no codigo ou neste arquivo. Default vazio (":") de proposito:
# sem isso, o Spring context falha ao subir (inclusive em testes que nao
# tocam em GroqClient) sempre que GROQ_API_KEY nao esta setada no shell --
# ver FinancasIaApplicationTests. Uma chave ausente/vazia so falha de fato
# quando uma chamada real a Groq API acontece (401), o que e o
# comportamento correto.
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.1-8b-instant
groq.api.timeout-connect-ms=5000
groq.api.timeout-read-ms=20000

# Retry/DLQ da categorizacao assincrona (T-4.3.2). Apos esgotar
# max-attempts com backoff exponencial (initial-interval-ms, dobrando a
# cada tentativa via multiplier), a mensagem e roteada para
# transaction.categorization.dlq em vez de perdida (ver RabbitConfig).
categorization.retry.max-attempts=3
categorization.retry.initial-interval-ms=1000
categorization.retry.multiplier=2.0

# Origem permitida por CORS (CorsConfig, E-6). Default e a porta padrao do
# Vite em dev; em producao, APP_CORS_ORIGIN aponta para o dominio da Vercel.
app.cors.origin=${APP_CORS_ORIGIN:http://localhost:5173}

# Actuator: so /health e exposto (usado pelo healthcheck do Render), nunca
# o conjunto default de endpoints (evita vazar detalhes internos).
management.endpoints.web.exposure.include=health
