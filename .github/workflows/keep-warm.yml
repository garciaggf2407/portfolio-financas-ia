name: Keep backend warm

# O plano free do Render hiberna o servico apos ~15min de inatividade e
# leva ~80s pra acordar na proxima requisicao -- inaceitavel pra uma demo
# publica de portfolio (recrutador abre o link, parece travado, desiste).
# Esse ping periodico mantem o backend acordado durante o horario em que
# alguem provavelmente estaria avaliando o projeto.
on:
  schedule:
    - cron: "*/10 11-23 * * *" # a cada 10min, 08h-20h horario de Brasilia (UTC-3)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /actuator/health
        run: curl -sf https://financas-ia-api.onrender.com/actuator/health
