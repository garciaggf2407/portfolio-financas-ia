name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: Backend (build + testes)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # mvn test roda a suite completa (unitarios + integracao, T-5.1.1/T-5.1.2/T-5.1.3).
      # Os testes de integracao usam Testcontainers (Postgres + RabbitMQ reais) --
      # nao dependem do docker-compose.yml de desenvolvimento, so do daemon Docker
      # ja disponivel por padrao nos runners ubuntu-latest do GitHub Actions.
      - name: Build + testes
        run: ./mvnw --batch-mode --no-transfer-progress test

      - name: Publicar relatorios de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
